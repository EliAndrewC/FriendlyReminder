{% extends "base.html" %}
{% block content %}
<h2>Send a voice message</h2>
<form method="post" id="voice-form">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="4" required autofocus placeholder="Alexandria Friends Meetinghouse is CLOSED due to snow this weekend"></textarea>
    <p class="secondary">Your message will be read aloud by an automated voice, preceded by "This is a message from Alexandria Friends Meeting."</p>

    <fieldset>
        <legend>Send to</legend>
        <label class="radio-label">
            <input type="radio" name="mode" value="test" checked>
            Test numbers only
        </label>
        <label class="radio-label">
            <input type="radio" name="mode" value="real" id="mode-real">
            All recipients
        </label>
    </fieldset>

    <button type="submit">Send</button>
</form>

<script>
const form = document.getElementById("voice-form");
form.addEventListener("submit", (e) => {
    if (document.getElementById("mode-real").checked) {
        if (!confirm("Send this voice message to ALL recipients?")) {
            e.preventDefault();
        }
    }
});
</script>
{% endblock %}
